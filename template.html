<!-- ============================================================
     완성본 본문 조각 템플릿 (재사용용)
     ------------------------------------------------------------
     · 이 파일을 복사해 글마다 내용만 교체하세요.
     · 규격: <!DOCTYPE>/<html>/<head>/<body> 없이 아래처럼
            <style>@import…</style> + <main class="page"> 로 시작/끝.
     · <script> 를 넣지 않습니다. 목차 여닫기는 호스트가 전역 로드한
       blog.js 가 .chapter-toggle 을 잡아 자동 작동합니다.
     · 섹션 개수 = 목차 항목 개수 = #sec1…#secN 가 서로 일치해야 합니다.
     · 이미지 슬라이드(.img-slide)·상품(aside)은 선택 사항입니다.
     ============================================================ -->
<style type="text/css">@import url("./style.css");</style>
<main class="page">
	<article>
		<div class="inner">
			<h2 class="page-title">{{글 제목}}</h2>
		</div>

		<!-- ===== 목차 ===== 항목 수와 href(#secN)를 섹션과 일치시키세요 -->
		<div class="inner">
			<div class="chapter">
				<div class="chapter-head">
					<h3 class="chapter-title">목차</h3><a class="chapter-toggle">목차 여닫기</a>
				</div>
				<div class="chapter-body">
					<ul class="chapter-list">
						<li class="chapter-item"><a class="chapter-link" href="#sec1">{{소제목 1}}</a></li>
						<li class="chapter-item"><a class="chapter-link" href="#sec2">{{소제목 2}}</a></li>
						<li class="chapter-item"><a class="chapter-link" href="#sec3">{{소제목 3}}</a></li>
					</ul>
				</div>
			</div>
		</div>

		<!-- ===== 섹션 1 ===== (이미지 슬라이드 포함 예시) -->
		<section class="sec" id="sec1">
			<div class="inner"><img class="sec-quotes-icon fr-fic fr-dii" src="https://dorangflower.cafe24.com/blog/sec_quotes.svg" alt="«">
				<h3 class="sec-title">{{소제목 1}}</h3>
				<h4 class="sec-subtitle">{{한 줄 설명}}</h4>
				<p class="sec-text">{{본문 단락. 강조는 <strong>이렇게</strong>, 단락 구분은 <br><br> 사용}}</p>
			</div>
			<div class="img-slide">
				<div class="inner">
					<ul class="img-slide-list pc-only">
						<li class="img-slide-item"><img src="{{PC 이미지1}}" alt="이미지 1" class="fr-fic fr-dii"></li>
						<li class="img-slide-item"><img src="{{PC 이미지2}}" alt="이미지 2" class="fr-fic fr-dii"></li>
					</ul>
					<ul class="img-slide-list mo-only">
						<li class="img-slide-item"><img src="{{모바일 이미지1}}" alt="이미지 1" class="fr-fic fr-dii"></li>
						<li class="img-slide-item"><img src="{{모바일 이미지2}}" alt="이미지 2" class="fr-fic fr-dii"></li>
					</ul>
				</div>
			</div>
		</section>

		<!-- ===== 섹션 2 ===== (이미지 없는 기본형) -->
		<section class="sec" id="sec2">
			<div class="inner"><img class="sec-quotes-icon fr-fic fr-dii" src="https://dorangflower.cafe24.com/blog/sec_quotes.svg" alt="«">
				<h3 class="sec-title">{{소제목 2}}</h3>
				<h4 class="sec-subtitle">{{한 줄 설명}}</h4>
				<p class="sec-text">{{본문 단락}}</p>
			</div>
		</section>

		<!-- ===== 섹션 3 ===== -->
		<section class="sec" id="sec3">
			<div class="inner"><img class="sec-quotes-icon fr-fic fr-dii" src="https://dorangflower.cafe24.com/blog/sec_quotes.svg" alt="«">
				<h3 class="sec-title">{{소제목 3}}</h3>
				<h4 class="sec-subtitle">{{한 줄 설명}}</h4>
				<p class="sec-text">{{본문 단락}}</p>
			</div>
		</section>

		<!-- ===== 상품 진열(선택) ===== 색상 클래스: yellow / red / green / purple -->
		<aside>
			<div class="product-list">
				<a class="product-item yellow" href="{{상품 링크}}">
					<div class="product-img"><img src="{{상품 이미지}}" alt="상품 1" class="fr-fic fr-dii"></div>
					<div class="product-info">
						<div class="product-nm">{{상품명}}</div>
						<div class="product-price"><del class="origin">{{정가}}</del> <span class="total">{{판매가}}</span></div>
					</div>
				</a>
			</div>
		</aside>
	</article>
</main>
